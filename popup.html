<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="logo">🌐</span>
      <span class="title">悟空翻译</span>
    </div>

    <div class="section">
      <div class="row">
        <div class="field">
          <label>源语言</label>
          <select id="fromLang">
            <option value="auto">自动检测</option>
            <option value="zh-CN">中文</option>
            <option value="en">英语</option>
            <option value="ja">日语</option>
            <option value="ko">韩语</option>
            <option value="fr">法语</option>
            <option value="de">德语</option>
            <option value="es">西班牙语</option>
            <option value="ru">俄语</option>
            <option value="it">意大利语</option>
            <option value="pt">葡萄牙语</option>
            <option value="ar">阿拉伯语</option>
            <option value="th">泰语</option>
            <option value="vi">越南语</option>
            <option value="id">印尼语</option>
          </select>
        </div>
        <div class="field">
          <label>目标语言</label>
          <select id="toLang">
            <option value="zh-CN">简体中文</option>
            <option value="zh-TW">繁体中文</option>
            <option value="en">英语</option>
            <option value="ja">日语</option>
            <option value="ko">韩语</option>
            <option value="fr">法语</option>
            <option value="de">德语</option>
            <option value="es">西班牙语</option>
            <option value="ru">俄语</option>
            <option value="it">意大利语</option>
            <option value="pt">葡萄牙语</option>
            <option value="ar">阿拉伯语</option>
            <option value="th">泰语</option>
            <option value="vi">越南语</option>
            <option value="id">印尼语</option>
          </select>
        </div>
      </div>
    </div>

    <div class="section">
      <label class="section-label">翻译引擎</label>
      <div class="engine-tabs">
        <label class="engine-tab" data-engine="google">
          <input type="radio" name="engine" value="google" checked>
          <span>Google</span>
        </label>
        <label class="engine-tab" data-engine="openai">
          <input type="radio" name="engine" value="openai">
          <span>AI</span>
        </label>
      </div>
    </div>

    <div class="section auto-row">
      <div class="auto-label">
        <span class="auto-title">此网站自动翻译</span>
        <span id="currentDomain" class="domain-name"></span>
      </div>
      <label class="switch">
        <input type="checkbox" id="autoToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div id="engineConfig">
      <div class="section config-section" id="googleConfig">
        <p class="hint">Google 免费翻译接口，无需 API 密钥</p>
      </div>
      <div class="section config-section" id="openaiConfig" style="display:none">
        <div class="field">
          <label>API Endpoint <span class="required">*</span></label>
           <input type="url" id="openaiEndpoint" value="https://api.siliconflow.cn/v1/chat/completions" placeholder="https://api.siliconflow.cn/v1/chat/completions">
        </div>
        <div class="field">
          <label>API Key <span class="required">*</span></label>
          <input type="password" id="openaiApiKey" placeholder="sk-...">
        </div>
        <div class="field">
          <label>模型名称</label>
           <input type="text" id="openaiModel" value="tencent/Hunyuan-MT-7B" placeholder="tencent/Hunyuan-MT-7B">
        </div>
      </div>
    </div>

    <div class="actions">
      <button id="translateBtn" class="btn btn-primary">翻译页面</button>
      <button id="restoreBtn" class="btn btn-secondary" disabled>显示原文</button>
    </div>

    <div id="status" class="status">就绪</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
